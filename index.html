<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commercial Support Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 380px; height: 500px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #chat-window { flex: 1; padding: 15px; overflow-y: auto; background: #fafafa; border-bottom: 1px solid #eee; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 15px; max-width: 75%; font-size: 14px; line-height: 1.4; }
        .user { background: #007bff; color: white; margin-left: auto; text-align: right; }
        .bot { background: #e9ecef; color: #333; }
        #input-area { display: flex; padding: 10px; background: white; }
        #user-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; outline: none; }
        #send-btn { background: #007bff; color: white; border: none; padding: 0 15px; margin-left: 5px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-window">
        <div class="msg bot">Hello! How can I help you with our services today?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask about pricing, support, hours...">
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const chatWindow = document.getElementById("chat-window");
        const text = inputField.value.trim();
        if (!text) return;

        // Display user message locally
        chatWindow.innerHTML += `<div class="msg user">${text}</div>`;
        inputField.value = "";
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            // Fetch response from FastAPI running locally
            const response = await fetch("http://127.0.0.1:8000/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            
            // Display bot response
            chatWindow.innerHTML += `<div class="msg bot">${data.response}</div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;
        } catch (error) {
            chatWindow.innerHTML += `<div class="msg bot" style="color:red;">Error connecting to chat server.</div>`;
        }
    }
</script>
</body>
</html>
